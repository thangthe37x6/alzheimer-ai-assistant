version: '3.8'

services:
  web:
    build: .
    container_name: alzheimer_fastapi
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - ./model:/app/model
      - ./chroma_db:/app/chroma_db
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: alzheimer_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
