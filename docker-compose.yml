services:
  web:
    build: .
    container_name: alzheimer_fastapi
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./model:/app/model
      - ./chroma_db:/app/chroma_db
    networks:
      - app-network

  redis:
    image: redis:7-bookworm
    container_name: alzheimer_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
